<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Квинт — словесная дуэль 5×5</title>
  <style>
    :root {
      --bg: #1a1a2e; --surface: #16213e; --cell-empty: #1a3a5c;
      --cell-hover: #1e4d7b; --cell-pre: #3d3d5c; --text: #e0e0e0;
      --accent: #e94560; --player-1: #e74c3c; --player-2: #3498db;
      --player-3: #2ecc71; --player-4: #f39c12; --gold: #e2b04a;
      --highlight-new: #ffdd57; --highlight-path: #00e5ff;
      --success: #2ecc71; --error: #e74c3c; --radius: 10px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg); font-family:'Segoe UI',Arial,sans-serif;
      display:flex; justify-content:center; align-items:center;
      min-height:100vh; color:var(--text); user-select:none; padding:10px;
    }
    .container{
      background:var(--surface); border-radius:16px; padding:24px 20px;
      max-width:560px; width:100%; box-shadow:0 4px 20px rgba(0,0,0,0.4);
      display:flex; flex-direction:column; align-items:center; gap:16px;
    }
    h1{font-size:1.8rem; font-weight:700; background:linear-gradient(135deg,var(--gold),#f0c060); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
    .mode-select{display:flex; gap:12px; margin-bottom:8px;}
    .mode-btn{padding:10px 20px; background:#2a2a4a; color:#ccc; border:2px solid #555; border-radius:8px; cursor:pointer; font-weight:600;}
    .mode-btn.active{background:var(--accent); color:#fff; border-color:var(--accent);}
    .panel{display:flex; flex-direction:column; align-items:center; gap:10px; width:100%;}
    .network-info{background:#1e2a3a; padding:12px; border-radius:8px; text-align:center; font-size:0.95rem;}
    .network-info span{font-weight:bold; color:var(--gold);}
    .btn{padding:10px 18px; border-radius:8px; border:none; font-weight:700; cursor:pointer; transition:0.2s; font-size:0.95rem;}
    .btn:hover{transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.35);}
    .btn-primary{background:var(--accent); color:#fff;}
    .btn-secondary{background:#555; color:#ccc;}
    .btn-success{background:var(--success); color:#fff;}
    .btn-danger{background:#c0392b; color:#fff;}
    .board{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; width:min(380px,85vw); height:min(380px,85vw);}
    .cell{
      background:var(--cell-empty); border-radius:var(--radius); display:flex;
      align-items:center; justify-content:center; font-size:1.5rem; font-weight:700;
      border:2px solid transparent; color:#c8c8d0; aspect-ratio:1; transition:0.15s;
    }
    .cell:not(.occupied):not(.disabled):hover{background:var(--cell-hover); border-color:#5a9fd4; transform:scale(1.04);}
    .cell.occupied{border-color:rgba(255,255,255,0.15);}
    .cell.pre-filled{background:var(--cell-pre); color:#c0c0d0; border-color:rgba(255,255,255,0.2); cursor:default;}
    .cell.player-1{background:#5c1a1a; color:#ff6b6b; border-color:var(--player-1);}
    .cell.player-2{background:#1a305c; color:#6bb5ff; border-color:var(--player-2);}
    .cell.player-3{background:#1a4a2a; color:#5dff8a; border-color:var(--player-3);}
    .cell.player-4{background:#4a3a10; color:#ffc944; border-color:var(--player-4);}
    .cell.newly-placed{animation:pulse 0.7s ease-in-out 3; border-color:var(--highlight-new)!important; box-shadow:0 0 18px rgba(255,221,87,0.7);}
    .cell.path-highlight{animation:pathGlow 0.5s ease-in-out; border-color:var(--highlight-path)!important; box-shadow:0 0 16px rgba(0,229,255,0.7);}
    .cell.disabled{pointer-events:none; opacity:0.7;}
    @keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(255,221,87,0.4)}50%{box-shadow:0 0 22px rgba(255,221,87,0.9)}}
    @keyframes pathGlow{0%{box-shadow:0 0 4px rgba(0,229,255,0.3)}50%{box-shadow:0 0 20px rgba(0,229,255,0.8)}}
    .info-panel{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; width:100%;}
    .player-card{background:#1e2a3a; border-radius:10px; padding:10px 14px; text-align:center; min-width:70px; flex:1; border:2px solid transparent; transition:0.3s;}
    .player-card.active{border-color:#fff; box-shadow:0 0 16px rgba(255,255,255,0.3); transform:translateY(-3px); background:#253545;}
    .player-card.p1{border-left:4px solid var(--player-1);}
    .player-card.p2{border-left:4px solid var(--player-2);}
    .turn-indicator{text-align:center; font-weight:600; padding:6px 14px; background:#1e2a3a; border-radius:20px;}
    .input-area{display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center;}
    .input-area input{padding:10px 14px; border-radius:8px; border:2px solid #555; background:#1a1a2e; color:#fff; width:140px; text-align:center; text-transform:uppercase;}
    .keyboard-container{display:flex; flex-direction:column; align-items:center; gap:4px;}
    .keyboard-row{display:flex; gap:3px; justify-content:center;}
    .key-btn{width:28px; height:32px; border-radius:4px; border:1px solid #555; background:#2a2a3e; color:#ddd; cursor:pointer; font-size:0.75rem; font-weight:600;}
    .message{text-align:center; font-weight:600; font-size:0.9rem; min-height:22px;}
    .message.success{color:var(--success);}
    .message.error{color:var(--error);}
    .message.info{color:#aaa;}
    .overlay{position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(4px);}
    .modal{background:var(--surface); border-radius:16px; padding:30px 24px; text-align:center; max-width:400px; width:90%;}
    .winner-name{font-size:2rem; font-weight:900; background:linear-gradient(135deg,#e2b04a,#ffd700); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}}
    .hidden{display:none!important;}
    .spinner{display:inline-block; width:16px; height:16px; border:2px solid #fff; border-radius:50%; border-top-color:transparent; animation:spin 0.8s linear infinite; margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #roomId{user-select:all; cursor:pointer;}
  </style>
</head>
<body>
<div class="container" id="gameContainer">
  <h1>📝 Квинт</h1>
  <div class="mode-select" id="modeSelect">
    <button class="mode-btn active" id="btnLocalMode">🏠 Локально</button>
    <button class="mode-btn" id="btnNetworkMode">🌐 Сетевая игра</button>
  </div>
  <div id="localPanel" class="panel">
    <div style="display:flex; gap:10px; align-items:center;">
      <label>Игроков:</label>
      <select id="playerCount"><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
      <button class="btn btn-primary" id="btnStartLocal">🎮 Начать игру</button>
    </div>
  </div>
  <div id="networkPanel" class="panel hidden">
    <div id="networkCreate">
      <button class="btn btn-primary" id="btnCreateGame">📡 Создать игру</button>
      <div id="createInfo" class="network-info hidden">
        <p>Комната: <span id="roomId"></span>
        <button class="btn btn-secondary" id="btnCopyId" style="padding:2px 8px; margin-left:6px;">📋 Копировать</button></p>
        <p>Ожидание игроков (<span id="playersNeeded">1</span>)...</p>
      </div>
    </div>
    <div style="border-top:1px solid #444; width:100%; margin:6px 0;"></div>
    <div style="display:flex; gap:10px; align-items:center;">
      <input type="text" id="remoteIdInput" placeholder="Введите ID комнаты" style="width:180px; padding:8px; border-radius:6px; background:#1a1a2e; border:1px solid #555; color:#fff;">
      <button class="btn btn-primary" id="btnJoinGame">🔗 Присоединиться</button>
    </div>
  </div>
  <div id="gameArea" class="panel hidden">
    <div class="board" id="board"></div>
    <div class="turn-indicator" id="turnIndicator">Ход: <span id="currentPlayerName"></span></div>
    <div class="message" id="message"></div>
    <div class="input-area" id="inputArea">
      <span>Слово:</span>
      <input type="text" id="wordInput" placeholder="введите слово" maxlength="25" autocomplete="off">
      <button class="btn btn-success" id="btnSubmit">✅ Подтвердить</button>
      <button class="btn btn-secondary" id="btnPass">⏭ Пас</button>
      <button class="btn btn-danger" id="btnCancelLetterPlaced">↩ Отменить букву</button>
    </div>
    <div class="keyboard-container" id="keyboardContainer">
      <div id="keyboardRows"></div>
      <button class="btn btn-secondary" id="btnCancelLetter">↩ Отмена выбора клетки</button>
    </div>
    <div class="info-panel" id="playerCards"></div>
  </div>
  <div class="overlay hidden" id="gameOverOverlay">
    <div class="modal" id="gameOverModal"></div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  // Состояние игры
  const BOARD_SIZE = 5;

  let gameStarted = false, gameOver = false, turnInProgress = false;

  const playerColors = ['player-1','player-2','player-3','player-4'];

  function initBoard(word) {
    board = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill().map(() => ({letter:null, owner:null, preFilled:false})));
    const w = word.toUpperCase();
    for (let c=0; c<BOARD_SIZE; c++) {
      board[2][c] = { letter: w[c] || 'А', owner: null, preFilled: true };
    }
  }

  function renderBoard() {
    boardEl.innerHTML = '';
    for (let r=0; r<BOARD_SIZE; r++) {
      for (let c=0; c<BOARD_SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.row = r;
        cell.dataset.col = c;
        const data = board[r][c];
        if (data.letter) {
          cell.textContent = data.letter;
          cell.classList.add('occupied');
          if (data.preFilled) cell.classList.add('pre-filled');
          else if (data.owner !== null) cell.classList.add(playerColors[data.owner]);
        }
        if (newlyPlacedCell && newlyPlacedCell.row===r && newlyPlacedCell.col===c && !data.preFilled) {
          cell.classList.add('newly-placed');
        }
        if (highlightedPathCells.some(p => p.row===r && p.col===c)) {
          cell.classList.add('path-highlight');
        }

        const isMyTurn = (amHost && currentPlayer===0) || (!amHost && myPlayerIndex===currentPlayer);
        const canClick = !gameOver && gameStarted && !turnInProgress && data.letter===null && (!isNetwork || isMyTurn);
        if (canClick) {
          cell.addEventListener('click', () => onCellClick(r,c));
          cell.style.cursor = 'pointer';
        } else {
          cell.classList.add('disabled');
        }
        boardEl.appendChild(cell);
      }
    }
  }

  function onCellClick(row, col) {
    if (gameOver || !gameStarted || turnInProgress) return;
    if (board[row][col].letter !== null) return;
    if (isNetwork && !amHost) {
      if (currentPlayer !== myPlayerIndex) return;
      if (pendingCell) clearPendingCell();
      showLetterInput(row, col);
      return;
    }
    if (pendingCell) clearPendingCell();
    showLetterInput(row, col);
  }

  function showLetterInput(row, col) {
    pendingCell = {row, col};
    keyboardContainer.classList.remove('hidden');
    messageEl.textContent = `Выберите букву для клетки (${row+1},${col+1})`;
    keyboardContainer.dataset.targetRow = row;
    keyboardContainer.dataset.targetCol = col;
    renderBoard();
  }

  function clearPendingCell() {
    pendingCell = null;
    keyboardContainer.classList.add('hidden');
    if (!turnInProgress) updateTurnMessage();
    renderBoard();
  }

  function placeLetter(row, col, letter) {
    board[row][col] = { letter, owner: currentPlayer, preFilled: false };
    newlyPlacedCell = {row, col};
    turnInProgress = true;
    pendingCell = null;
    keyboardContainer.classList.add('hidden');
    inputArea.classList.remove('hidden');
    wordInput.value = '';
    wordInput.focus();
    messageEl.textContent = `Буква "${letter}" размещена! Введите слово.`;
    renderBoard();
    updatePlayerCards();
  }

  function findWordPath(word) {
    if (!newlyPlacedCell) return null;
    const w = word.toUpperCase();
    const reqR = newlyPlacedCell.row, reqC = newlyPlacedCell.col;
    for (let sr=0; sr<BOARD_SIZE; sr++) {
      for (let sc=0; sc<BOARD_SIZE; sc++) {
        if (board[sr][sc].letter === w[0]) {
          const visited = new Set();
          const path = [];
          const res = dfs(sr, sc, w, 0, visited, path, reqR, reqC);
          if (res) return res;
        }
      }
    }
    return null;
  }

  function dfs(r,c,word,idx,visited,path,reqR,reqC) {
    if (idx >= word.length) return null;
    if (r<0||r>=BOARD_SIZE||c<0||c>=BOARD_SIZE) return null;
    const key = `${r},${c}`;
    if (visited.has(key)) return null;
    if (board[r][c].letter !== word[idx]) return null;
    visited.add(key);
    path.push({row:r, col:c});
    if (idx === word.length-1) {
      if (path.some(p => p.row===reqR && p.col===reqC)) {
        const result = [...path];
        visited.delete(key); path.pop();
        return result;
      }
    }
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dr,dc] of dirs) {
      const found = dfs(r+dr, c+dc, word, idx+1, visited, path, reqR, reqC);
      if (found) { visited.delete(key); path.pop(); return found; }
    }
    visited.delete(key);
    path.pop();
    return null;
  }

  async function isWordValidOnline(word) {
    try {
      const url = `https://ru.wiktionary.org/w/api.php?action=query&format=json&titles=${encodeURIComponent(word)}&origin=*`;
      const res = await fetch(url);
      const data = await res.json();
      return Object.keys(data.query.pages)[0] !== "-1";
    } catch { return false; }
  }

  async function checkWord(word) {
    const raw = word.toUpperCase().replace(/[^А-ЯЁ]/g, '');
    if (raw.length < 3) return { ok: false, msg: 'Минимум 3 буквы' };
    if (raw === centerWord) return { ok: false, msg: 'Нельзя использовать центральное слово' };
    const path = findWordPath(raw);
    if (!path) return { ok: false, msg: 'Не удалось собрать слово по клеткам' };

    if (LOCAL_DICT.has(raw)) return { ok: true, path, points: raw.length };

    messageEl.innerHTML = '<span class="spinner"></span> Проверяем слово...';
    btnSubmit.disabled = btnPass.disabled = true;
    const valid = await isWordValidOnline(raw);
    btnSubmit.disabled = btnPass.disabled = false;
    if (valid) return { ok: true, path, points: raw.length };
    else {
      messageEl.textContent = `Слова "${raw}" нет в словаре`;
      messageEl.className = 'message error';
      return { ok: false };
    }
  }

  async function submitWordHandler() {
    if (!turnInProgress || gameOver) return;
    const word = wordInput.value.trim().toUpperCase().replace(/[^А-ЯЁ]/g, '');
    if (isNetwork && !amHost) {
      connections[0].send({ type:'move', playerIndex:myPlayerIndex, action:'submitWord', payload:{word} });
      inputArea.classList.add('hidden');
      messageEl.textContent = 'Ход отправлен...';
      return;
    }
    const check = await checkWord(word);
    if (!check.ok) { messageEl.textContent = check.msg; shake(wordInput); return; }
    applyWordResult(check.path, check.points);
    if (isNetwork && amHost) broadcastState();
  }

  function applyWordResult(path, points) {
    highlightedPathCells = path;
    scores[currentPlayer] += points;
    turnInProgress = false;
    inputArea.classList.add('hidden');
    messageEl.textContent = `✅ Слово на ${points} очков! Игрок ${currentPlayer+1} +${points}`;
    messageEl.className = 'message success';
    renderBoard();
    updatePlayerCards();
    setTimeout(() => {
      highlightedPathCells = [];
      newlyPlacedCell = null;
      if (isBoardFull()) endGame();
      else nextTurn();
      renderBoard();
      updatePlayerCards();
    }, 1800);
  }

  function passTurnAction() {
    messageEl.textContent = `😔 Игрок ${currentPlayer+1} пасует.`;
    turnInProgress = false;
    inputArea.classList.add('hidden');
    setTimeout(() => {
      highlightedPathCells = [];
      newlyPlacedCell = null;
      if (isBoardFull()) endGame();
      else nextTurn();
      renderBoard();
      updatePlayerCards();
    }, 1200);
  }

  function nextTurn() {
    currentPlayer = (currentPlayer + 1) % numPlayers;
    turnInProgress = false;
    newlyPlacedCell = pendingCell = null;
    highlightedPathCells = [];
    wordInput.value = '';
    inputArea.classList.add('hidden');
    keyboardContainer.classList.add('hidden');
    currentPlayerNameEl.textContent = `Игрок ${currentPlayer+1}`;
    currentPlayerNameEl.style.color = playerColorHex[currentPlayer];
    updateTurnMessage();
    if (isNetwork && amHost) broadcastState();
    renderBoard();
    updatePlayerCards();
  }

  function isBoardFull() {
    return board.every(row => row.every(cell => cell.letter !== null));
  }

  function endGame() {
    gameOver = true;
    turnInProgress = false;
    newlyPlacedCell = pendingCell = null;
    highlightedPathCells = [];
    inputArea.classList.add('hidden');
    keyboardContainer.classList.add('hidden');
    renderBoard(); updatePlayerCards();
    const maxScore = Math.max(...scores);
    const winners = scores.reduce((acc, s, i) => s===maxScore ? [...acc, i] : acc, []);
    const winnerHTML = winners.length===1 ? `<span class="winner-name">Игрок ${winners[0]+1}</span> победил с ${maxScore} очками!` : `Ничья!`;
    gameOverModal.innerHTML = `<h2>🏆 Игра окончена!</h2><div>${winnerHTML}</div>${scores.map((s,i)=>`<div>Игрок ${i+1}: ${s} очков</div>`).join('')}<button class="btn btn-primary" onclick="location.reload()">🔄 Новая игра</button>`;
    gameOverOverlay.classList.remove('hidden');
    if (isNetwork && amHost) broadcastState();
  }

  function updatePlayerCards() {
    playerCardsDiv.innerHTML = scores.map((s,i) => `
      <div class="player-card p${i+1} ${i===currentPlayer&&!gameOver?'active':''}">
        <div class="name">Игрок ${i+1}</div>
        <div class="score" style="color:${playerColorHex[i]}">${s}</div>
      </div>`).join('');
  }

  function updateTurnMessage() {
    const isMyTurn = (amHost && currentPlayer===0) || (!amHost && myPlayerIndex===currentPlayer);
    messageEl.textContent = isMyTurn ? 'Ваш ход! Выберите клетку.' : 'Ожидайте хода соперника.';
  }

  function shake(el) { el.style.animation = 'shake 0.4s ease'; setTimeout(()=>el.style.animation='',400); }

  const keyboardLayout = ['ЙЦУКЕНГШЩЗХЪ','ФЫВАПРОЛДЖЭ','ЯЧСМИТЬБЮЁ'];
  function buildKeyboard() {
    keyboardRows.innerHTML = keyboardLayout.map(row => {
      return `<div class="keyboard-row">${row.split('').map(ch => `<button class="key-btn">${ch}</button>`).join('')}</div>`;
    }).join('');
    document.querySelectorAll('.key-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const r = parseInt(keyboardContainer.dataset.targetRow);
        const c = parseInt(keyboardContainer.dataset.targetCol);
        if (isNaN(r) || isNaN(c) || !pendingCell || pendingCell.row!==r || pendingCell.col!==c || board[r][c].letter!==null) return;
        const letter = btn.textContent;
        if (isNetwork && !amHost) {
          connections[0].send({ type:'move', playerIndex:myPlayerIndex, action:'placeLetter', payload:{row:r, col:c, letter} });
          keyboardContainer.classList.add('hidden');
          pendingCell = null;
          messageEl.textContent = 'Буква отправлена...';
        } else {
          placeLetter(r, c, letter);
          if (isNetwork && amHost) broadcastState();
        }
      });
    });
  }

  btnCancelLetter.addEventListener('click', () => { if (pendingCell) clearPendingCell(); });
  btnCancelPlaced.addEventListener('click', () => {
    if (!turnInProgress || !newlyPlacedCell) return;
    board[newlyPlacedCell.row][newlyPlacedCell.col] = { letter:null, owner:null, preFilled:false };
    newlyPlacedCell = null;
    turnInProgress = false;
    inputArea.classList.add('hidden');
    messageEl.textContent = 'Буква отменена.';
    renderBoard(); updatePlayerCards();
    if (isNetwork && amHost) broadcastState();
  });

  // СЕТЕВАЯ ЧАСТЬ
  function broadcastState() {
    if (!amHost || !isNetwork) return;
    const state = { type:'state', board, scores, currentPlayer, gameOver, centerWord, numPlayers, turnInProgress, newlyPlacedCell, highlightedPathCells };
    console.log('Отправка состояния:', state);
    connections.forEach(conn => conn.send(state));
  }

  async function handleNetworkMove(data) {
    if (!amHost) return;
    console.log('Получен ход от игрока:', data);
    const {playerIndex, action, payload} = data;
    if (playerIndex !== currentPlayer) {
      const conn = connections.find(c => c.metadata?.playerIndex === playerIndex);
      if (conn) conn.send({type:'error', msg:'Не ваш ход'});
      return;
    }
    if (action === 'placeLetter') {
      const {row, col, letter} = payload;
      if (board[row][col].letter !== null) return;
      placeLetter(row, col, letter);
      broadcastState();
    } else if (action === 'submitWord') {
      const check = await checkWord(payload.word);
      if (!check.ok) {
        const conn = connections.find(c => c.metadata?.playerIndex === playerIndex);
        if (conn) conn.send({type:'error', msg:check.msg});
        broadcastState();
        return;
      }
      applyWordResult(check.path, check.points);
      broadcastState();
    } else if (action === 'pass') {
      passTurnAction();
      broadcastState();
    }
  }

  function setupHost(count) {
    amHost = true; myPlayerIndex = 0; numPlayers = count;
    peer = new Peer(PEER_CONFIG);
    peer.on('open', id => {
      console.log('Хост открыт, ID:', id);
      roomIdSpan.textContent = id;
      createInfo.classList.remove('hidden');
      playersNeededSpan.textContent = count - 1;
    });
    peer.on('connection', conn => {
      console.log('Новое подключение');
      conn.on('open', () => {
        const idx = connections.length + 1;
        conn.metadata = { playerIndex: idx };
        connections.push(conn);
        conn.send({ type:'welcome', playerIndex:idx, numPlayers });
        console.log('Отправлен welcome игроку', idx);
        playersNeededSpan.textContent = count - 1 - connections.length;
        if (connections.length === count - 1) {
          console.log('Все подключились, начинаем игру');
          startNetworkGame();
        }
      });
      conn.on('data', data => {
        console.log('Данные от клиента:', data);
        if (data.type==='move') handleNetworkMove(data);
      });
      conn.on('close', () => {
        connections = connections.filter(c => c!==conn);
        playersNeededSpan.textContent = count - 1 - connections.length;
      });
    });
  }

  function setupClient(hostId) {
    amHost = false;
    peer = new Peer(PEER_CONFIG);
    peer.on('open', id => {
      console.log('Клиент открыт, подключаемся к', hostId);
      const conn = peer.connect(hostId, {reliable:true});
      conn.on('open', () => {
        console.log('Соединение установлено');
        connections = [conn];
        conn.on('data', data => {
          console.log('Получены данные от хоста:', data);
          if (data.type==='welcome') {
            myPlayerIndex = data.playerIndex;
            numPlayers = data.numPlayers;
            console.log('Welcome: я игрок', myPlayerIndex+1);
          } else if (data.type==='state') {
            console.log('Применяю состояние');
            applyState(data);
          } else if (data.type==='error') {
            messageEl.textContent = data.msg;
            console.warn('Ошибка от хоста:', data.msg);
          }
        });
        conn.on('close', () => alert('Соединение с хостом потеряно.'));
      });
    });
  }

  function startNetworkGame() {
    const words = ['СЛОВО','БУКВА','ДОСКА','ИГРОК','ГОРОД','КНИГА','РУЧКА','МЕСТО','КОШКА','МЫШКА'];
    centerWord = words[Math.floor(Math.random()*words.length)];
    initBoard(centerWord);
    scores = Array(numPlayers).fill(0);
    currentPlayer = 0;
    gameStarted = true; gameOver = false; turnInProgress = false;
    newlyPlacedCell = pendingCell = null; highlightedPathCells = [];
    gameArea.classList.remove('hidden');
    document.querySelectorAll('.mode-select, #localPanel, #networkPanel').forEach(el => el.classList.add('hidden'));
    turnIndicator.classList.remove('hidden');
    currentPlayerNameEl.textContent = 'Игрок 1';
    messageEl.textContent = amHost ? 'Ваш ход! Выберите клетку.' : 'Игра началась! Ожидайте хода.';
    renderBoard(); updatePlayerCards();
    if (amHost) broadcastState();
  }

  function applyState(state) {
    board = state.board; scores = state.scores; currentPlayer = state.currentPlayer;
    gameOver = state.gameOver; centerWord = state.centerWord; numPlayers = state.numPlayers;
    turnInProgress = state.turnInProgress; newlyPlacedCell = state.newlyPlacedCell;
    highlightedPathCells = state.highlightedPathCells || [];

    // Показываем игру, если она скрыта (важно для клиента)
    if (gameArea.classList.contains('hidden')) {
      gameArea.classList.remove('hidden');
      document.querySelectorAll('.mode-select, #localPanel, #networkPanel').forEach(el => el.classList.add('hidden'));
      turnIndicator.classList.remove('hidden');
    }

    renderBoard(); updatePlayerCards();
    if (gameOver) endGame();
    else {
      currentPlayerNameEl.textContent = `Игрок ${currentPlayer+1}`;
      updateTurnMessage();
      const isMyTurn = (!amHost && myPlayerIndex===currentPlayer) || (amHost && currentPlayer===0);
      if (isMyTurn && turnInProgress) {
        inputArea.classList.remove('hidden');
        wordInput.value=''; wordInput.focus();
      } else {
        inputArea.classList.add('hidden');
        keyboardContainer.classList.add('hidden');
      }
    }
  }

  // Кнопки интерфейса
  btnLocalMode.addEventListener('click', ()=>{
    isNetwork = false;
    btnLocalMode.classList.add('active'); btnNetworkMode.classList.remove('active');
    localPanel.classList.remove('hidden'); networkPanel.classList.add('hidden'); gameArea.classList.add('hidden');
  });
  btnNetworkMode.addEventListener('click', ()=>{
    isNetwork = true;
    btnNetworkMode.classList.add('active'); btnLocalMode.classList.remove('active');
    localPanel.classList.add('hidden'); networkPanel.classList.remove('hidden'); gameArea.classList.add('hidden');
  });
  btnStartLocal.addEventListener('click', ()=>{
    numPlayers = parseInt(playerCountSelect.value) || 2;
    const words = ['СЛОВО','БУКВА','ДОСКА','ИГРОК','ГОРОД','КНИГА','РУЧКА','МЕСТО','КОШКА','МЫШКА'];
    centerWord = words[Math.floor(Math.random()*words.length)];
    initBoard(centerWord);
    scores = Array(numPlayers).fill(0);
    currentPlayer = 0;
    gameStarted = true; gameOver = false; turnInProgress = false;
    newlyPlacedCell = pendingCell = null; highlightedPathCells = [];
    isNetwork = false; amHost = false;
    gameArea.classList.remove('hidden');
    document.querySelectorAll('.mode-select, #localPanel, #networkPanel').forEach(el => el.classList.add('hidden'));
    turnIndicator.classList.remove('hidden');
    currentPlayerNameEl.textContent = 'Игрок 1';
    messageEl.textContent = `Центральное слово: "${centerWord}". Игрок 1, выберите клетку.`;
    renderBoard(); updatePlayerCards();
  });
  btnCreateGame.addEventListener('click', ()=>{
    const count = parseInt(prompt('Количество игроков (2-4):','2')) || 2;
    if (count<2||count>4) return;
    isNetwork = true;
    document.querySelectorAll('.mode-select, #localPanel').forEach(el => el.classList.add('hidden'));
    networkPanel.classList.remove('hidden');
    document.querySelector('#networkCreate button').style.display = 'none';
    setupHost(count);
  });
  btnJoinGame.addEventListener('click', ()=>{
    const hostId = remoteIdInput.value.trim();
    if (!hostId) return;
    isNetwork = true;
    document.querySelectorAll('.mode-select, #localPanel').forEach(el => el.classList.add('hidden'));
    networkPanel.classList.remove('hidden');
    document.querySelector('#networkCreate').style.display = 'none';
    remoteIdInput.style.display = 'none';
    btnJoinGame.style.display = 'none';
    setupClient(hostId);
  });
  btnCopyId.addEventListener('click', ()=>{
    navigator.clipboard.writeText(roomIdSpan.textContent).then(()=>{
      btnCopyId.textContent = '✅ Скопировано';
      setTimeout(()=> btnCopyId.textContent = '📋 Копировать', 2000);
    });
  });

  btnSubmit.addEventListener('click', submitWordHandler);
  btnPass.addEventListener('click', ()=>{
    if (!turnInProgress || gameOver) return;
    if (isNetwork && !amHost) {
      connections[0].send({type:'move', playerIndex:myPlayerIndex, action:'pass'});
      inputArea.classList.add('hidden');
      messageEl.textContent = 'Пас отправлен.';
      return;
    }
    passTurnAction();
    if (isNetwork && amHost) broadcastState();
  });
  wordInput.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); btnSubmit.click(); } });

  buildKeyboard();
  updatePlayerCards();
})();
</script>
</body>
</html>
